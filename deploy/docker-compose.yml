# Production topology for aitest1.snu.in (single domain).
#
# TRUST MODEL:
#   - Postgres has NO host port — only the app/cron reach it over the internal
#     docker network.
#   - MinIO is published to 127.0.0.1:9007 ONLY so the host's system Caddy can
#     reverse-proxy /coe3d-models/* to it. Never 0.0.0.0; the console is NOT
#     published.
#   - The app is published to 127.0.0.1:3007 ONLY so the host's system Caddy can
#     reverse-proxy everything-else to it. Not directly public either.
#   - Public TLS termination + routing is the host's existing Caddy
#     (deploy/aitest1.Caddyfile), NOT anything here.
#
# Ports 3007 (app) and 9007 (MinIO) were chosen because 3000/3001 are already in
# use on this box by other sites. If you change them, update aitest1.Caddyfile too.
#
# Bring up:  docker compose --env-file ../.env -f docker-compose.yml up -d --build
# Migrate:   automatic via the `migrate` one-shot service.
# Bucket:    automatic via the `createbucket` one-shot service.
# Reminders: the `cron` sidecar POSTs /api/cron/reminders every 15 minutes.

name: coe3d

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  miniodata:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: coe3d
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in ../.env}
      POSTGRES_DB: coe3d
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [internal]
    # NO ports: — Postgres is reachable only on the internal network.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coe3d -d coe3d"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in ../.env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in ../.env}
      # MinIO's public-facing URL is the single domain + bucket prefix.
      MINIO_SERVER_URL: https://aitest1.snu.in/coe3d-models
    volumes:
      - miniodata:/data
    networks: [internal]
    # Bound to LOOPBACK ONLY so the host Caddy can proxy /coe3d-models/* here.
    # Never 0.0.0.0. The console (9001) is intentionally NOT published.
    ports:
      - "127.0.0.1:9007:9000"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    networks: [internal]
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do echo waiting for minio; sleep 2; done;
      mc mb -p local/${S3_BUCKET:-coe3d-models} || true;
      echo 'bucket ready';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?}
    restart: "no"

  migrate:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://coe3d:${POSTGRES_PASSWORD:?}@postgres:5432/coe3d?schema=public
    networks: [internal]
    # Apply migrations, then exit.
    command: ["node_modules/.bin/prisma", "migrate", "deploy"]
    restart: "no"

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - ../.env
    environment:
      # The .env DATABASE_URL already targets host "postgres"; re-assert it here
      # so the container never accidentally inherits a 127.0.0.1 value.
      DATABASE_URL: postgresql://coe3d:${POSTGRES_PASSWORD:?}@postgres:5432/coe3d?schema=public
      # Presigned URLs are signed against the PUBLIC endpoint; the app process
      # itself never reaches MinIO — the browser does, via Caddy.
      S3_ENDPOINT: https://aitest1.snu.in
      S3_FORCE_PATH_STYLE: "true"
    networks: [internal]
    # Bound to LOOPBACK ONLY so the host Caddy proxies everything-else here.
    ports:
      - "127.0.0.1:3007:3000"

  # Reminder cron: POST /api/cron/reminders every 15 minutes with the bearer
  # secret. Hits the app over the internal network (not the public domain), so
  # it works regardless of Caddy. Sends 24h/1h booking reminders.
  cron:
    image: curlimages/curl:latest
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    networks: [internal]
    environment:
      CRON_SECRET: ${CRON_SECRET:?set CRON_SECRET in ../.env}
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "cron sidecar: POST http://app:3000/api/cron/reminders every 900s";
        while true; do
          sleep 900;
          code=$$(curl -s -o /dev/null -w '%{http_code}' -X POST \
            -H "Authorization: Bearer $${CRON_SECRET}" \
            http://app:3000/api/cron/reminders || echo "curl-failed");
          echo "$$(date -u +%FT%TZ) reminders -> $$code";
        done
